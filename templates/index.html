<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PREDICTATOR | Enterprise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body { background-color: #0b0e11; color: #e2e8f0; font-family: sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .ticker-item:hover { background: rgba(220, 38, 38, 0.1); border-left: 3px solid #dc2626; cursor: pointer; }
        .toggle-checkbox:checked { right: 0; border-color: #22c55e; }
        .toggle-checkbox:checked + .toggle-label { background-color: #22c55e; }
        .chat-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .chip { background: #1f2937; padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; transition: 0.2s; border: 1px solid #374151; }
        .chip:hover { background: #3b82f6; border-color: #60a5fa; color: white;}
    </style>
</head>
<body class="flex h-screen">

    <div class="w-72 bg-[#0f1216] border-r border-gray-800 flex flex-col hidden md:flex">
        <div class="p-4 border-b border-gray-800 flex items-center justify-between">
            <span class="text-red-600 font-black text-2xl tracking-tighter">PREDICTATOR</span>
            <span class="bg-gray-800 text-gray-400 text-[9px] px-2 py-1 rounded font-bold">v3.0</span>
        </div>
        
        <div id="sidebar-ai" class="flex-1 overflow-y-auto">
            <div class="px-6 py-2 text-xs font-bold text-gray-500 mt-2">FOUNDER'S PICK</div>
            <div onclick="loadStock('ODDSOCEAN')" class="ticker-item px-6 py-3 border-b border-gray-800/50 flex justify-between bg-red-900/10">
                <span class="font-bold text-red-500">ODDSOCEAN</span><span class="text-green-400 text-xs font-bold">🚀 MOON</span>
            </div>
            <div class="px-6 py-2 text-xs font-bold text-gray-500 mt-2">GLOBAL MARKETS</div>
            <div onclick="loadStock('AAPL')" class="ticker-item px-6 py-3 border-b border-gray-800/50 flex justify-between"><span>AAPL</span><span class="text-green-500 text-xs">BUY</span></div>
            <div onclick="loadStock('NVDA')" class="ticker-item px-6 py-3 border-b border-gray-800/50 flex justify-between"><span>NVDA</span><span class="text-purple-500 text-xs">AI</span></div>
            <div onclick="loadStock('SRMIST')" class="ticker-item px-6 py-3 border-b border-gray-800/50 flex justify-between"><span>SRMIST</span><span class="text-yellow-500 text-xs">EDU</span></div>
        </div>

        <div id="sidebar-trading" class="hidden flex-1 flex flex-col">
            <div class="p-6 bg-gray-900/50 border-b border-gray-800">
                <div class="text-xs text-gray-500 font-bold">CASH BALANCE</div>
                <div id="walletDisplay" class="text-2xl text-green-400 font-mono font-bold">$10,000.00</div>
                <div class="text-xs text-gray-500 font-bold mt-4">INVESTED CAPITAL</div>
                <div id="investedDisplay" class="text-lg text-blue-400 font-mono font-bold">$0.00</div>
            </div>
            <div class="px-6 py-2 text-xs font-bold text-gray-500 mt-2">ACTIVE POSITIONS</div>
            <div id="holdingsList" class="flex-1 px-6 overflow-y-auto text-sm space-y-2 py-2">No active positions.</div>
        </div>
    </div>

    <div class="flex-1 flex flex-col relative">
        <div class="h-16 border-b border-gray-800 flex items-center px-6 justify-between bg-[#0b0e11]">
            <div class="flex items-center gap-4">
                <h1 id="stockName" class="text-2xl font-bold text-white">LOADING...</h1>
                <span id="stockPrice" class="text-green-500 font-mono text-xl">---</span>
            </div>
            
            <div class="flex items-center gap-4">
                <input type="text" id="search" placeholder="SYMBOL" class="bg-gray-800 text-white px-3 py-1 rounded w-24 border border-gray-600 uppercase focus:border-blue-500 focus:outline-none">
                <button onclick="loadStock(document.getElementById('search').value)" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1 rounded font-bold text-sm transition">SEARCH</button>
                
                <div class="flex items-center ml-4 border-l border-gray-700 pl-4">
                    <span class="text-xs font-bold mr-2 text-red-500" id="modeLabel">AI MODE</span>
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="modeToggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" onclick="switchMode()"/>
                        <label for="toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-red-900 cursor-pointer"></label>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 p-2 relative">
            <div id="chart" class="w-full h-full"></div>
            <div id="loader" class="absolute inset-0 bg-[#0b0e11] bg-opacity-90 flex flex-col items-center justify-center z-40 hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-red-600 mb-4"></div>
                <div class="text-red-500 font-mono tracking-widest text-sm">FETCHING YFINANCE DATA...</div>
            </div>
        </div>

        <div id="panel-ai" class="h-44 border-t border-gray-800 bg-[#0f1216] grid grid-cols-4 divide-x divide-gray-800">
            <div class="p-4 flex flex-col justify-center items-center">
                <div class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">RF Prediction Target</div>
                <div id="aiPred" class="text-4xl font-mono text-white mt-1 font-bold">---</div>
            </div>
            <div class="p-4 flex flex-col justify-center items-center">
                <div class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">Model R² Confidence</div>
                <div id="aiConf" class="text-4xl font-mono text-blue-400 mt-1 font-bold">---</div>
            </div>
            <div class="p-4 flex flex-col justify-center items-center">
                <div class="text-gray-500 text-[10px] uppercase font-bold tracking-widest">NLP Market Sentiment</div>
                <div id="aiSent" class="text-2xl font-bold text-gray-300 mt-2 uppercase tracking-wide">---</div>
            </div>
            <div class="p-4 flex flex-col justify-center px-8">
                <div class="text-gray-50
